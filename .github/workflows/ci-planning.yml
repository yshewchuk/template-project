name: CI - Planning Validation

on:
  push:
    paths:
      - ".planning/**"
      - "scripts/planning/**"
  pull_request:
    paths:
      - ".planning/**"
      - "scripts/planning/**"

concurrency:
  group: ci-planning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-planning:
    name: Validate Planning YAML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate planning files
        run: make validate-planning
