# Accept Work Cycle
#
# Trigger: an implementation PR is merged.
# Stages:
#   1. Developer (contribute) — update build/CI for acceptance tests if needed
#   2. Acceptance Tester (contribute) — run acceptance tests, record results
#   3. Tech Lead (contribute) — update plan with acceptance state
#   4. Product Manager (review) — review acceptance results and plan updates
#
# See docs/agents/work-cycles/accept.md for details.

name: "Work Cycle: Accept"

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: agent-execution
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  detect-trigger:
    name: Detect implementation merge
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      plan_file: ${{ steps.detect.outputs.plan_file }}
      milestone_id: ${{ steps.detect.outputs.milestone_id }}
      pr_id: ${{ steps.detect.outputs.pr_id }}
      impl_pr_number: ${{ steps.detect.outputs.impl_pr_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if implementation PR
        id: detect
        shell: bash
        run: |
          PR_LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"

          IS_IMPLEMENTATION=false
          if echo "$PR_LABELS" | grep -q '"work-cycle/implementation"'; then
            IS_IMPLEMENTATION=true
          fi
          if echo "$PR_BRANCH" | grep -qE '^(impl/|feat/)'; then
            IS_IMPLEMENTATION=true
          fi

          if [ "$IS_IMPLEMENTATION" = "false" ]; then
            echo "Not an implementation PR merge, skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pip install pyyaml > /dev/null 2>&1

          # Find the milestone and PR ID from the merged branch name
          RESULT=$(python3 -c "
          import yaml, glob, sys, json

          for plan_file in sorted(glob.glob('.planning/plans/*.yaml')):
              with open(plan_file) as f:
                  plan = yaml.safe_load(f)
              for m in plan.get('milestones', []):
                  if m.get('status') != 'in-progress':
                      continue
                  for pr in m.get('pull_requests', []):
                      branch = pr.get('branch', '')
                      if branch == '$PR_BRANCH' or pr.get('status') == 'in-progress':
                          print(json.dumps({
                              'plan_file': plan_file,
                              'milestone_id': m['id'],
                              'pr_id': pr['id']
                          }))
                          sys.exit(0)
          print('{}')
          " 2>/dev/null || echo '{}')

          if [ "$RESULT" = "{}" ]; then
            echo "Could not find matching plan entry, running with defaults"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "plan_file=" >> "$GITHUB_OUTPUT"
            echo "milestone_id=" >> "$GITHUB_OUTPUT"
            echo "pr_id=" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "plan_file=$(echo "$RESULT" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("plan_file",""))')" >> "$GITHUB_OUTPUT"
            echo "milestone_id=$(echo "$RESULT" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("milestone_id",""))')" >> "$GITHUB_OUTPUT"
            echo "pr_id=$(echo "$RESULT" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("pr_id",""))')" >> "$GITHUB_OUTPUT"
          fi

          echo "impl_pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

  create-branch:
    name: Create acceptance branch
    needs: detect-trigger
    if: needs.detect-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create branch
        id: branch
        shell: bash
        run: |
          SUFFIX="${{ needs.detect-trigger.outputs.pr_id }}"
          if [ -z "$SUFFIX" ]; then
            SUFFIX="${{ github.event.pull_request.number }}"
          fi
          BRANCH="accept/$SUFFIX"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

  stage-1-developer-ci:
    name: "Stage 1: Developer — CI updates"
    needs: [detect-trigger, create-branch]
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: accept
      persona: developer
      stage_number: "1"
      stage_type: contribute
      stage_label: "stage/developer"
      branch: ${{ needs.create-branch.outputs.branch }}
      all_stages_json: >-
        [
          {"number":1,"type":"contribute","persona":"Developer","skipped":false},
          {"number":2,"type":"contribute","persona":"Acceptance Tester","skipped":false},
          {"number":3,"type":"contribute","persona":"Tech Lead","skipped":false},
          {"number":4,"type":"review","persona":"Product Manager","skipped":false}
        ]
      prompt: |
        Implementation PR #${{ needs.detect-trigger.outputs.impl_pr_number }} has been merged.
        Plan: ${{ needs.detect-trigger.outputs.plan_file }}
        Milestone: ${{ needs.detect-trigger.outputs.milestone_id }}
        Completed PR: ${{ needs.detect-trigger.outputs.pr_id }}

        Your task (DevOps scope):
        1. Review the merged implementation and check if acceptance test infrastructure needs updates.
        2. Update CI/build configuration if needed to run acceptance tests against the new code.
        3. Only modify files within Developer ownership scope.
        4. Commit and push changes (or skip if no updates needed).
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  stage-2-acceptance-tester:
    name: "Stage 2: Acceptance Tester — assess tests"
    needs: [detect-trigger, create-branch, stage-1-developer-ci]
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: accept
      persona: acceptance-tester
      stage_number: "2"
      stage_type: contribute
      stage_label: "stage/acceptance-tester"
      branch: ${{ needs.create-branch.outputs.branch }}
      all_stages_json: >-
        [
          {"number":1,"type":"contribute","persona":"Developer","skipped":false},
          {"number":2,"type":"contribute","persona":"Acceptance Tester","skipped":false},
          {"number":3,"type":"contribute","persona":"Tech Lead","skipped":false},
          {"number":4,"type":"review","persona":"Product Manager","skipped":false}
        ]
      prompt: |
        Implementation PR #${{ needs.detect-trigger.outputs.impl_pr_number }} for ${{ needs.detect-trigger.outputs.pr_id }} has been merged.

        Your task:
        1. Run all acceptance tests for the milestone.
        2. Record which tests now pass and which still fail.
        3. Verify no regressions (previously passing tests still pass).
        4. For tests expected to pass after this PR but still failing: flag them as implementation gaps.
        5. For tests not expected to pass yet: confirm they fail for the right reasons.
        6. Adjust test-to-PR mappings only if the implementation is demonstrably correct and original expectations were wrong.
        7. Do NOT fix implementation code or iterate to make failing tests pass.
        8. Commit observations as test result annotations or comments.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  stage-3-tech-lead-plan:
    name: "Stage 3: Tech Lead — update plan"
    needs: [detect-trigger, create-branch, stage-2-acceptance-tester]
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: accept
      persona: tech-lead
      stage_number: "3"
      stage_type: contribute
      stage_label: "stage/tech-lead"
      branch: ${{ needs.create-branch.outputs.branch }}
      all_stages_json: >-
        [
          {"number":1,"type":"contribute","persona":"Developer","skipped":false},
          {"number":2,"type":"contribute","persona":"Acceptance Tester","skipped":false},
          {"number":3,"type":"contribute","persona":"Tech Lead","skipped":false},
          {"number":4,"type":"review","persona":"Product Manager","skipped":false}
        ]
      prompt: |
        The Acceptance Tester has assessed test results for PR ${{ needs.detect-trigger.outputs.pr_id }}.

        Your task:
        1. Review the acceptance test results.
        2. Update the plan at ${{ needs.detect-trigger.outputs.plan_file }} to reflect:
           - Which acceptance tests now pass (update `passing_at_pr` fields)
           - Mark the merged PR status as `merged`
           - Note any regressions
           - If tests that should pass don't: add new planned PRs to address gaps
           - Adjust test-to-PR mappings if remapped by the Acceptance Tester
        3. If all PRs in the milestone are merged and all tests pass:
           - Update milestone status to `completed`
        4. Run `make validate-planning` to verify the plan.
        5. Commit and push changes.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  open-pr:
    name: Open acceptance PR
    needs: [detect-trigger, create-branch, stage-3-tech-lead-plan]
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-branch.outputs.branch }}

      - name: Create PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Accept] Assessment for ${{ needs.detect-trigger.outputs.pr_id || github.event.pull_request.number }}`,
              body: [
                `## Acceptance Assessment`,
                ``,
                `- **Implementation PR:** #${{ needs.detect-trigger.outputs.impl_pr_number }}`,
                `- **Plan PR ID:** ${{ needs.detect-trigger.outputs.pr_id }}`,
                `- **Milestone:** ${{ needs.detect-trigger.outputs.milestone_id }}`,
                ``,
                `This PR records acceptance test results and plan updates following an implementation merge.`,
              ].join('\n'),
              head: '${{ needs.create-branch.outputs.branch }}',
              base: 'main',
              draft: false,
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['work-cycle/acceptance'],
            });

            core.setOutput('number', pr.number);

  stage-4-pm-review:
    name: "Stage 4: Product Manager — review"
    needs: [detect-trigger, create-branch, open-pr]
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: accept
      persona: product-manager
      stage_number: "4"
      stage_type: review
      stage_label: "stage/review-product-manager"
      branch: ${{ needs.create-branch.outputs.branch }}
      pr_number: ${{ needs.open-pr.outputs.pr_number }}
      all_stages_json: >-
        [
          {"number":1,"type":"contribute","persona":"Developer","skipped":false},
          {"number":2,"type":"contribute","persona":"Acceptance Tester","skipped":false},
          {"number":3,"type":"contribute","persona":"Tech Lead","skipped":false},
          {"number":4,"type":"review","persona":"Product Manager","skipped":false}
        ]
      prompt: |
        The Accept work cycle for PR ${{ needs.detect-trigger.outputs.pr_id }} is complete.
        Acceptance test results and plan updates are ready for review.
        Please review the acceptance assessment for correctness.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
