# AUTO-GENERATED from docs/agents/work-cycles/stages/accept.yaml
# Do not edit manually. Run: make generate-workflows

name: 'Work Cycle: Accept'
'on':
  pull_request:
    branches:
    - main
    types:
    - closed
concurrency:
  group: agent-execution
  cancel-in-progress: false
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  detect:
    name: Detect implementation merge
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      plan_file: ${{ steps.detect.outputs.plan_file }}
      milestone_id: ${{ steps.detect.outputs.milestone_id }}
      pr_id: ${{ steps.detect.outputs.pr_id }}
      impl_pr_number: ${{ steps.detect.outputs.impl_pr_number }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: pip install pyyaml
    - name: Detect implementation merge
      id: detect
      shell: bash
      run: |-
        PR_BRANCH="${{ github.event.pull_request.head.ref }}"

        eval "$(python3 scripts/work-cycle/classify_pr.py \
          --branch "$PR_BRANCH" \
          --labels '${{ toJson(github.event.pull_request.labels.*.name) }}')"

        if [ "$is_implementation" != "true" ]; then
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          echo "plan_file=" >> "$GITHUB_OUTPUT"
          echo "milestone_id=" >> "$GITHUB_OUTPUT"
          echo "pr_id=" >> "$GITHUB_OUTPUT"
          echo "impl_pr_number=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        python3 scripts/work-cycle/detect_impl_pr.py --branch "$PR_BRANCH" >> "$GITHUB_OUTPUT"

        echo "should_run=true" >> "$GITHUB_OUTPUT"
        echo "impl_pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
    if: github.event.pull_request.merged == true
  create-branch:
    name: Create accept branch
    needs: detect
    if: needs.detect.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Create branch
      id: branch
      shell: bash
      run: |-
        SUFFIX="${{ needs.detect.outputs.pr_id }}"
        if [ -z "$SUFFIX" ]; then
          SUFFIX="${{ github.event.pull_request.number }}"
        fi
        BRANCH="accept/$SUFFIX"
        git checkout -b "$BRANCH"
        git push -u origin "$BRANCH"
        echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
  stage-1-developer-ci-updates:
    name: 'Stage 1: Developer — CI updates'
    needs:
    - detect
    - create-branch
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: accept
      persona: developer
      stage_number: '1'
      stage_type: contribute
      stage_label: stage/developer
      prompt_template: docs/agents/prompts/accept/developer-ci-updates.md
      prompt_vars: impl_pr_number=${{ needs.detect.outputs.impl_pr_number }} plan_file=${{ needs.detect.outputs.plan_file }} milestone_id=${{ needs.detect.outputs.milestone_id }} pr_id=${{ needs.detect.outputs.pr_id
        }}
      all_stages_json: '[{"number":1,"type":"contribute","persona":"Developer","skipped":false},{"number":2,"type":"contribute","persona":"Acceptance Tester","skipped":false},{"number":3,"type":"contribute","persona":"Tech
        Lead","skipped":false},{"number":4,"type":"review","persona":"Product Manager","skipped":false}]'
      branch: ${{ needs.create-branch.outputs.branch }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  stage-2-acceptance-tester-assess-tests:
    name: 'Stage 2: Acceptance Tester — assess tests'
    needs:
    - detect
    - create-branch
    - stage-1-developer-ci-updates
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: accept
      persona: acceptance-tester
      stage_number: '2'
      stage_type: contribute
      stage_label: stage/acceptance-tester
      prompt_template: docs/agents/prompts/accept/acceptance-tester-assess.md
      prompt_vars: impl_pr_number=${{ needs.detect.outputs.impl_pr_number }} pr_id=${{ needs.detect.outputs.pr_id }}
      all_stages_json: '[{"number":1,"type":"contribute","persona":"Developer","skipped":false},{"number":2,"type":"contribute","persona":"Acceptance Tester","skipped":false},{"number":3,"type":"contribute","persona":"Tech
        Lead","skipped":false},{"number":4,"type":"review","persona":"Product Manager","skipped":false}]'
      branch: ${{ needs.create-branch.outputs.branch }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  stage-3-tech-lead-update-plan:
    name: 'Stage 3: Tech Lead — update plan'
    needs:
    - detect
    - create-branch
    - stage-2-acceptance-tester-assess-tests
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: accept
      persona: tech-lead
      stage_number: '3'
      stage_type: contribute
      stage_label: stage/tech-lead
      prompt_template: docs/agents/prompts/accept/tech-lead-update-plan.md
      prompt_vars: pr_id=${{ needs.detect.outputs.pr_id }} plan_file=${{ needs.detect.outputs.plan_file }}
      all_stages_json: '[{"number":1,"type":"contribute","persona":"Developer","skipped":false},{"number":2,"type":"contribute","persona":"Acceptance Tester","skipped":false},{"number":3,"type":"contribute","persona":"Tech
        Lead","skipped":false},{"number":4,"type":"review","persona":"Product Manager","skipped":false}]'
      branch: ${{ needs.create-branch.outputs.branch }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  open-pr:
    name: Open accept PR
    needs:
    - detect
    - create-branch
    - stage-3-tech-lead-update-plan
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.create-branch.outputs.branch }}
    - name: Create PR
      id: pr
      uses: actions/github-script@v7
      with:
        script: |
          const fn = require('./scripts/work-cycle/github/create-work-cycle-pr.js');
          await fn({ github, context, core });
      env:
        PR_TITLE: '[Accept] Assessment for ${{ needs.detect.outputs.pr_id || github.event.pull_request.number }}'
        PR_BODY: |-
          ## Acceptance Assessment

          - **Implementation PR:** #${{ needs.detect.outputs.impl_pr_number }}
          - **Plan PR ID:** ${{ needs.detect.outputs.pr_id }}
          - **Milestone:** ${{ needs.detect.outputs.milestone_id }}

          This PR records acceptance test results and plan updates following an implementation merge.
        HEAD_BRANCH: ${{ needs.create-branch.outputs.branch }}
        WORK_CYCLE_LABEL: work-cycle/acceptance
  stage-4-product-manager-review:
    name: 'Stage 4: Product Manager — review'
    needs:
    - detect
    - create-branch
    - open-pr
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: accept
      persona: product-manager
      stage_number: '4'
      stage_type: review
      stage_label: stage/review-product-manager
      prompt_template: docs/agents/prompts/accept/pm-review-acceptance.md
      prompt_vars: pr_id=${{ needs.detect.outputs.pr_id }}
      all_stages_json: '[{"number":1,"type":"contribute","persona":"Developer","skipped":false},{"number":2,"type":"contribute","persona":"Acceptance Tester","skipped":false},{"number":3,"type":"contribute","persona":"Tech
        Lead","skipped":false},{"number":4,"type":"review","persona":"Product Manager","skipped":false}]'
      branch: ${{ needs.create-branch.outputs.branch }}
      pr_number: ${{ needs.open-pr.outputs.pr_number }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
