# Implementation Work Cycle
#
# Trigger: either a verification PR is merged (first implementation PR in the milestone)
#          or an acceptance PR is merged while the milestone still has remaining PRs.
# Stages:
#   1. Developer (contribute) — implement functional code, post PR
#   2. Developer (contribute) — CI/build updates, logging, unit tests
#   3. Tech Lead (review) — plan adherence, architecture, security
#   4. Acceptance Tester (review) — unit test adequacy
#   5. Product Manager (review) — requirements satisfaction
#
# See docs/agents/work-cycles/implementation.md for details.

name: "Work Cycle: Implementation"

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: agent-execution
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  detect-trigger:
    name: Detect implementation trigger
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      plan_file: ${{ steps.detect.outputs.plan_file }}
      milestone_id: ${{ steps.detect.outputs.milestone_id }}
      pr_id: ${{ steps.detect.outputs.pr_id }}
      pr_title: ${{ steps.detect.outputs.pr_title }}
      pr_branch: ${{ steps.detect.outputs.pr_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check for verification or acceptance merge
        id: detect
        shell: bash
        run: |
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          PR_LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'

          IS_TRIGGER=false
          if echo "$PR_BRANCH" | grep -qE '^verify/'; then
            IS_TRIGGER=true
          fi
          if echo "$PR_LABELS" | grep -q '"work-cycle/acceptance"'; then
            IS_TRIGGER=true
          fi
          if echo "$PR_BRANCH" | grep -qE '^accept/'; then
            IS_TRIGGER=true
          fi

          if [ "$IS_TRIGGER" = "false" ]; then
            echo "Not a verification or acceptance PR merge, skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "plan_file=" >> "$GITHUB_OUTPUT"
            echo "milestone_id=" >> "$GITHUB_OUTPUT"
            echo "pr_id=" >> "$GITHUB_OUTPUT"
            echo "pr_title=" >> "$GITHUB_OUTPUT"
            echo "pr_branch=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 scripts/work-cycle/detect_next_pr.py >> "$GITHUB_OUTPUT"

  create-branch:
    name: Create implementation branch
    needs: detect-trigger
    if: needs.detect-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create branch
        id: branch
        shell: bash
        run: |
          BRANCH="${{ needs.detect-trigger.outputs.pr_branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="impl/${{ needs.detect-trigger.outputs.pr_id }}"
          fi
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

  stage-1-developer-functional:
    name: "Stage 1: Developer — functional code"
    needs: [detect-trigger, create-branch]
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: implementation
      persona: developer
      stage_number: "1"
      stage_type: contribute
      stage_label: "stage/developer"
      branch: ${{ needs.create-branch.outputs.branch }}
      prompt_template: docs/agents/prompts/implementation/developer-functional-code.md
      prompt_vars: >-
        pr_id=${{ needs.detect-trigger.outputs.pr_id }}
        pr_title=${{ needs.detect-trigger.outputs.pr_title }}
        plan_file=${{ needs.detect-trigger.outputs.plan_file }}
        milestone_id=${{ needs.detect-trigger.outputs.milestone_id }}
      all_stages_json: >-
        [
          {"number":1,"type":"contribute","persona":"Developer","skipped":false},
          {"number":2,"type":"contribute","persona":"Developer","skipped":false},
          {"number":3,"type":"review","persona":"Tech Lead","skipped":false},
          {"number":4,"type":"review","persona":"Acceptance Tester","skipped":false},
          {"number":5,"type":"review","persona":"Product Manager","skipped":false}
        ]
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  stage-2-developer-quality:
    name: "Stage 2: Developer — CI, logging, unit tests"
    needs: [detect-trigger, create-branch, stage-1-developer-functional]
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: implementation
      persona: developer
      stage_number: "2"
      stage_type: contribute
      stage_label: "stage/developer"
      branch: ${{ needs.create-branch.outputs.branch }}
      prompt_template: docs/agents/prompts/implementation/developer-quality-layers.md
      prompt_vars: >-
        pr_id=${{ needs.detect-trigger.outputs.pr_id }}
      all_stages_json: >-
        [
          {"number":1,"type":"contribute","persona":"Developer","skipped":false},
          {"number":2,"type":"contribute","persona":"Developer","skipped":false},
          {"number":3,"type":"review","persona":"Tech Lead","skipped":false},
          {"number":4,"type":"review","persona":"Acceptance Tester","skipped":false},
          {"number":5,"type":"review","persona":"Product Manager","skipped":false}
        ]
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  open-pr:
    name: Open implementation PR
    needs: [detect-trigger, create-branch, stage-2-developer-quality]
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-branch.outputs.branch }}

      - name: Create PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Implementation] ${{ needs.detect-trigger.outputs.pr_id }}: ${{ needs.detect-trigger.outputs.pr_title }}`,
              body: [
                `## Implementation PR`,
                ``,
                `- **Plan PR ID:** ${{ needs.detect-trigger.outputs.pr_id }}`,
                `- **Milestone:** ${{ needs.detect-trigger.outputs.milestone_id }}`,
                `- **Plan file:** ${{ needs.detect-trigger.outputs.plan_file }}`,
                ``,
                `This PR was created by the Implementation work cycle.`,
              ].join('\n'),
              head: '${{ needs.create-branch.outputs.branch }}',
              base: 'main',
              draft: false,
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['work-cycle/implementation'],
            });

            core.setOutput('number', pr.number);

  stage-3-tech-lead-review:
    name: "Stage 3: Tech Lead — review"
    needs: [detect-trigger, create-branch, open-pr]
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: implementation
      persona: tech-lead
      stage_number: "3"
      stage_type: review
      stage_label: "stage/review-tech-lead"
      branch: ${{ needs.create-branch.outputs.branch }}
      pr_number: ${{ needs.open-pr.outputs.pr_number }}
      prompt_template: docs/agents/prompts/implementation/tech-lead-review.md
      prompt_vars: >-
        pr_number=${{ needs.open-pr.outputs.pr_number }}
        pr_id=${{ needs.detect-trigger.outputs.pr_id }}
      all_stages_json: >-
        [
          {"number":1,"type":"contribute","persona":"Developer","skipped":false},
          {"number":2,"type":"contribute","persona":"Developer","skipped":false},
          {"number":3,"type":"review","persona":"Tech Lead","skipped":false},
          {"number":4,"type":"review","persona":"Acceptance Tester","skipped":false},
          {"number":5,"type":"review","persona":"Product Manager","skipped":false}
        ]
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  stage-4-acceptance-tester-review:
    name: "Stage 4: Acceptance Tester — review"
    needs: [detect-trigger, create-branch, open-pr, stage-3-tech-lead-review]
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: implementation
      persona: acceptance-tester
      stage_number: "4"
      stage_type: review
      stage_label: "stage/review-acceptance-tester"
      branch: ${{ needs.create-branch.outputs.branch }}
      pr_number: ${{ needs.open-pr.outputs.pr_number }}
      prompt_template: docs/agents/prompts/implementation/acceptance-tester-review.md
      prompt_vars: >-
        pr_number=${{ needs.open-pr.outputs.pr_number }}
      all_stages_json: >-
        [
          {"number":1,"type":"contribute","persona":"Developer","skipped":false},
          {"number":2,"type":"contribute","persona":"Developer","skipped":false},
          {"number":3,"type":"review","persona":"Tech Lead","skipped":false},
          {"number":4,"type":"review","persona":"Acceptance Tester","skipped":false},
          {"number":5,"type":"review","persona":"Product Manager","skipped":false}
        ]
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  stage-5-pm-review:
    name: "Stage 5: Product Manager — review"
    needs: [detect-trigger, create-branch, open-pr, stage-4-acceptance-tester-review]
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: implementation
      persona: product-manager
      stage_number: "5"
      stage_type: review
      stage_label: "stage/review-product-manager"
      branch: ${{ needs.create-branch.outputs.branch }}
      pr_number: ${{ needs.open-pr.outputs.pr_number }}
      prompt_template: docs/agents/prompts/implementation/pm-review-implementation.md
      prompt_vars: >-
        pr_number=${{ needs.open-pr.outputs.pr_number }}
        pr_id=${{ needs.detect-trigger.outputs.pr_id }}
        pr_title=${{ needs.detect-trigger.outputs.pr_title }}
      all_stages_json: >-
        [
          {"number":1,"type":"contribute","persona":"Developer","skipped":false},
          {"number":2,"type":"contribute","persona":"Developer","skipped":false},
          {"number":3,"type":"review","persona":"Tech Lead","skipped":false},
          {"number":4,"type":"review","persona":"Acceptance Tester","skipped":false},
          {"number":5,"type":"review","persona":"Product Manager","skipped":false}
        ]
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
