# AUTO-GENERATED from docs/agents/work-cycles/stages/improve.yaml
# Do not edit manually. Run: make generate-workflows

name: 'Work Cycle: Improve'
'on':
  push:
    branches:
    - main
    paths:
    - .planning/plans/**
concurrency:
  group: agent-execution
  cancel-in-progress: false
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  detect:
    name: Detect completed milestone
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      plan_file: ${{ steps.detect.outputs.plan_file }}
      plan_id: ${{ steps.detect.outputs.plan_id }}
      milestone_id: ${{ steps.detect.outputs.milestone_id }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: pip install pyyaml
    - name: Detect completed milestone
      id: detect
      shell: bash
      run: |-
        CHANGED=$(git diff --name-only HEAD~1 HEAD -- '.planning/plans/' || true)
        if [ -z "$CHANGED" ]; then
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          echo "plan_file=" >> "$GITHUB_OUTPUT"
          echo "plan_id=" >> "$GITHUB_OUTPUT"
          echo "milestone_id=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        python3 scripts/work-cycle/detect_completed_milestone.py --plan-files $CHANGED >> "$GITHUB_OUTPUT"
  create-branch:
    name: Create improve branch
    needs: detect
    if: needs.detect.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Create branch
      id: branch
      shell: bash
      run: |-
        BRANCH="improve/${{ needs.detect.outputs.milestone_id }}"
        git checkout -b "$BRANCH"
        git push -u origin "$BRANCH"
        echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
  stage-1-scrum-master-retrospective:
    name: 'Stage 1: Scrum Master — retrospective'
    needs:
    - detect
    - create-branch
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: improve
      persona: scrum-master
      stage_number: '1'
      stage_type: contribute
      stage_label: stage/scrum-master
      prompt_template: docs/agents/prompts/improve/scrum-master-retrospective.md
      prompt_vars: milestone_id=${{ needs.detect.outputs.milestone_id }} plan_file=${{ needs.detect.outputs.plan_file }}
      all_stages_json: '[{"number":1,"type":"contribute","persona":"Scrum Master","skipped":false},{"number":2,"type":"review","persona":"Product Manager","skipped":false},{"number":3,"type":"review","persona":"Tech
        Lead","skipped":false}]'
      branch: ${{ needs.create-branch.outputs.branch }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  open-pr:
    name: Open improve PR
    needs:
    - detect
    - create-branch
    - stage-1-scrum-master-retrospective
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.create-branch.outputs.branch }}
    - name: Create PR
      id: pr
      uses: actions/github-script@v7
      with:
        script: |
          const fn = require('./scripts/work-cycle/github/create-work-cycle-pr.js');
          await fn({ github, context, core });
      env:
        PR_TITLE: '[Improve] Retrospective for milestone ${{ needs.detect.outputs.milestone_id }}'
        PR_BODY: |-
          ## Improvement PR — Retrospective

          - **Milestone:** ${{ needs.detect.outputs.milestone_id }}
          - **Plan:** ${{ needs.detect.outputs.plan_file }}

          Process improvements and retrospective notes from the completed milestone.
        HEAD_BRANCH: ${{ needs.create-branch.outputs.branch }}
        WORK_CYCLE_LABEL: work-cycle/improve
  stage-2-product-manager-review:
    name: 'Stage 2: Product Manager — review'
    needs:
    - detect
    - create-branch
    - open-pr
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: improve
      persona: product-manager
      stage_number: '2'
      stage_type: review
      stage_label: stage/review-product-manager
      prompt_template: docs/agents/prompts/improve/pm-review-improvements.md
      prompt_vars: milestone_id=${{ needs.detect.outputs.milestone_id }}
      all_stages_json: '[{"number":1,"type":"contribute","persona":"Scrum Master","skipped":false},{"number":2,"type":"review","persona":"Product Manager","skipped":false},{"number":3,"type":"review","persona":"Tech
        Lead","skipped":false}]'
      branch: ${{ needs.create-branch.outputs.branch }}
      pr_number: ${{ needs.open-pr.outputs.pr_number }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  stage-3-tech-lead-review:
    name: 'Stage 3: Tech Lead — review'
    needs:
    - detect
    - create-branch
    - open-pr
    - stage-2-product-manager-review
    uses: ./.github/workflows/reusable/agent-invoke.yml
    with:
      work_cycle: improve
      persona: tech-lead
      stage_number: '3'
      stage_type: review
      stage_label: stage/review-tech-lead
      prompt_template: docs/agents/prompts/improve/tech-lead-review-improvements.md
      prompt_vars: milestone_id=${{ needs.detect.outputs.milestone_id }}
      all_stages_json: '[{"number":1,"type":"contribute","persona":"Scrum Master","skipped":false},{"number":2,"type":"review","persona":"Product Manager","skipped":false},{"number":3,"type":"review","persona":"Tech
        Lead","skipped":false}]'
      branch: ${{ needs.create-branch.outputs.branch }}
      pr_number: ${{ needs.open-pr.outputs.pr_number }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
