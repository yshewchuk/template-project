work_cycle: improve

trigger:
  type: push
  branches: [main]
  paths: [".planning/plans/**"]

detect:
  job_name: Detect completed milestone
  script: |
    CHANGED=$(git diff --name-only HEAD~1 HEAD -- '.planning/plans/' || true)
    if [ -z "$CHANGED" ]; then
      echo "should_run=false" >> "$GITHUB_OUTPUT"
      echo "plan_file=" >> "$GITHUB_OUTPUT"
      echo "plan_id=" >> "$GITHUB_OUTPUT"
      echo "milestone_id=" >> "$GITHUB_OUTPUT"
      exit 0
    fi
    python3 scripts/work-cycle/detect_completed_milestone.py --plan-files $CHANGED >> "$GITHUB_OUTPUT"
  outputs: [should_run, plan_file, plan_id, milestone_id]
  should_run_condition: "needs.detect.outputs.should_run == 'true'"
  needs_python: true
  fetch_depth: 2

branch:
  prefix: "improve"
  suffix: "${{ needs.detect.outputs.milestone_id }}"

create_pr:
  after_stage: 1
  title: "[Improve] Retrospective for milestone ${{ needs.detect.outputs.milestone_id }}"
  body: "## Improvement PR — Retrospective\n\n- **Milestone:** ${{ needs.detect.outputs.milestone_id }}\n- **Plan:** ${{ needs.detect.outputs.plan_file }}\n\nProcess improvements and retrospective notes from the completed milestone."
  label: "work-cycle/improve"

stages:
  - name: "retrospective"
    persona: scrum-master
    type: contribute
    label: "stage/scrum-master"
    prompt_template: improve/scrum-master-retrospective.md
    prompt_vars:
      - "milestone_id=${{ needs.detect.outputs.milestone_id }}"
      - "plan_file=${{ needs.detect.outputs.plan_file }}"

  - name: "review"
    persona: product-manager
    type: review
    label: "stage/review-product-manager"
    prompt_template: improve/pm-review-improvements.md
    prompt_vars:
      - "milestone_id=${{ needs.detect.outputs.milestone_id }}"

  - name: "review"
    persona: tech-lead
    type: review
    label: "stage/review-tech-lead"
    prompt_template: improve/tech-lead-review-improvements.md
    prompt_vars:
      - "milestone_id=${{ needs.detect.outputs.milestone_id }}"
